  <rect x="14" y="13" width="22" height="22" rx="5" fill="#111110"/>
  <text x="44" y="29" font-size="13" font-weight="600" fill="#111110">DevPortal</text>
  <rect x="0" y="47" width="220" height="1" fill="#E3E1DC"/>

  <!-- Workspaces label -->
  <text x="14" y="74" font-size="10" font-weight="600" fill="#9B9890" letter-spacing="0.7">WORKSPACES</text>

  <!-- Workspace: apple-internal (active) -->
  <rect x="4" y="82" width="212" height="32" rx="6" fill="#F2F1EE"/>
  <circle cx="17" cy="98" r="4" fill="#34C759"/>
  <text x="28" y="103" font-size="12" font-weight="500" fill="#111110">apple-internal</text>

  <!-- Workspace: open-source -->
