<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <style>
      text { font-family: Inter, -apple-system, sans-serif; }
      .mono { font-family: 'Courier New', monospace; }
    </style>
  </defs>

  <!-- Page background -->
  <rect width="1440" height="900" fill="#F7F6F3"/>

  <!-- ── SIDEBAR ── -->
